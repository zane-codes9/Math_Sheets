            appId: "1:408757720197:web:fd63c16cfc0fb3afc185ec",
            measurementId: "G-CZ7BSB67LV"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database(); // Database reference
        const auth = firebase.auth(); // Authentication service reference

        // --- DEFINE THE ADMIN UID (Paste the correct UID here) ---
        const ADMIN_UID = "MH6iCAGIYdYIbVCc1YZPaWccHYg2"; // Your UID
        // --- END OF ADMIN UID ---

        // Global Admin Page Variables
        let currentStudent = 'sham'; // Default student view
        let currentWorksheetId = null;
        let isNewWorksheet = false;
        let editor; // TinyMCE editor instance

        // --- Authentication Check ---
        auth.onAuthStateChanged(user => {
            if (!user) {
                // 1. NO USER LOGGED IN: Redirect to login page
                console.log('Admin: No user logged in. Redirecting to index.html');
                window.location.href = 'index.html';
            } else {
                // 2. USER IS LOGGED IN: Verify they are the Admin
                console.log(`Admin: User ${user.uid} is logged in. Verifying admin status...`);

                if (user.uid === ADMIN_UID) {
                    // 3. AUTHORIZED (IS ADMIN): Initialize the admin page functionality
                    console.log(`Admin: User ${user.uid} is authorized. Initializing admin panel.`);
                    initializeAdminPanel();
                } else {
                    // 4. NOT AUTHORIZED (Not Admin): Redirect non-admins away
                    console.error(`Admin: Authorization FAILED. User ${user.uid} is not the designated admin (${ADMIN_UID}). Redirecting.`);
                    alert("Accès Refusé. Seul l'administrateur peut accéder à cette page.");
                    window.location.href = 'index.html'; // Send non-admins back to login
                }
            }
        });
        // --- End of Authentication Check ---


        // Function to initialize the admin panel (TinyMCE and default view)
        // This is called ONLY after confirming the user is the admin
        function initializeAdminPanel() {
            console.log("Admin: Initializing TinyMCE editor...");
            tinymce.init({
                selector: '#worksheetContent',
                height: 500,
                 plugins: 'preview importcss searchreplace autolink autosave save directionality code visualblocks visualchars fullscreen image link media template codesample table charmap pagebreak nonbreaking anchor insertdatetime advlist lists wordcount help charmap quickbars emoticons',
                 menubar: 'file edit view insert format tools table help',
                 toolbar: 'undo redo | bold italic underline strikethrough | fontfamily fontsize blocks | alignleft aligncenter alignright alignjustify | outdent indent |  numlist bullist | forecolor backcolor removeformat | pagebreak | charmap emoticons | fullscreen  preview save print | insertfile image media template link anchor codesample | ltr rtl',

                // Example of content_css if you want editor styles to match worksheet.html
                // content_css: 'worksheet_styles.css', // You'd need to create this CSS file

                // Autosave feature (optional but useful)
                autosave_ask_before_unload: true,
                autosave_interval: '30s', // e.g., save every 30 seconds
                autosave_prefix: '{path}{query}-{id}-',
                autosave_restore_when_empty: false,
                autosave_retention: '2m', // Keep drafts for 2 minutes

                setup: function(ed) {
                    editor = ed; // Assign the editor instance globally
                    console.log("Admin: TinyMCE initialized.");
                    // Add listener for changes to update save status
                    ed.on('change dirty', function() {
                        document.getElementById('saveStatus').textContent = 'Modifications non sauvegardées';
                    });
                     // Optional: Clear autosave draft on explicit save
                     ed.on('ExecCommand', function(e) {
                          if (e.command === 'mceSave') { // If using a TinyMCE save button
                               editor.plugins.autosave.removeDraft();
                          }
                     });
                }
            });

            // Set the default student view after editor might be ready
            // Use a small timeout to ensure TinyMCE is likely initialized
            setTimeout(() => {
                 console.log("Admin: Setting initial student view to 'sham'.");
                 selectStudent('sham'); // Load Sham's worksheets by default
            }, 500); // Adjust timeout if needed

            // Add Logout Button functionality (optional, could be added to HTML too)
            const header = document.querySelector('.header');
             if (header) {
                 const logoutButton = document.createElement('button');
                 logoutButton.textContent = 'Déconnexion';
                 logoutButton.className = 'delete-btn'; // Use existing style or create new one
                 logoutButton.style.marginLeft = '15px'; // Add some spacing
                 logoutButton.onclick = () => {
                     if (confirm('Voulez-vous vous déconnecter ?')) {
                         auth.signOut().then(() => {
                             window.location.href = 'index.html';
                         }).catch(err => console.error("Logout error:", err));
                     }
                 };
                 // Append after the "Voir le Site" button
                 const previewSiteButton = header.querySelector('.preview-btn[onclick="goToHome()"]');
                 if (previewSiteButton) {
                     previewSiteButton.parentNode.insertBefore(logoutButton, previewSiteButton.nextSibling);
                 } else {
                      header.appendChild(logoutButton); // Fallback append
                 }
             }
        }


        // --- All Original Admin Functions (selectStudent, loadWorksheetList, etc.) ---
        // --- These functions remain largely the same as they handle the UI logic ---
        // --- after authorization is confirmed. ---

        function loadWorksheetList() {
            console.log(`Admin: Loading worksheet list for ${currentStudent}...`);
            const worksheetsRef = database.ref(`worksheets/${currentStudent}`);

            worksheetsRef.once('value', (snapshot) => {
                const worksheetList = document.getElementById('worksheetList');
                worksheetList.innerHTML = ''; // Clear loading message
                const data = snapshot.val();

                if (!data) {
                    worksheetList.innerHTML = '<div class="worksheet-item">Aucune feuille disponible</div>';
                    console.log(`Admin: No worksheets found for ${currentStudent}.`);
                    return;
                }

                 // Sort keys (optional: by title or date)
                 const sortedKeys = Object.keys(data).sort((a,b) => {
                      const titleA = data[a].title || '';
                      const titleB = data[b].title || '';
                      return titleA.localeCompare(titleB);
                 });

                console.log(`Admin: Found ${sortedKeys.length} worksheets for ${currentStudent}.`);
                 sortedKeys.forEach(worksheetId => {
                    const worksheet = data[worksheetId];
                    const listItem = document.createElement('div');
                    listItem.className = 'worksheet-item';
                    listItem.dataset.id = worksheetId; // Store ID for easier selection later
                    if (worksheetId === currentWorksheetId) {
                        listItem.classList.add('active');
                    }
                    listItem.textContent = worksheet.title || 'Sans titre';
                    listItem.title = `ID: ${worksheetId}\nDescription: ${worksheet.description || '-'}\nDate: ${worksheet.date || '-'}`; // Tooltip
                    listItem.onclick = () => selectWorksheet(worksheetId);
                    worksheetList.appendChild(listItem);
                });
            }).catch(error => {
                 console.error(`Admin: Error loading worksheet list for ${currentStudent}:`, error);
                 worksheetList.innerHTML = `<div class="worksheet-item" style="color: red;">Erreur de chargement</div>`;
            });
        }

        function selectStudent(student) {
             if (currentStudent === student && document.getElementById('worksheetList').children.length > 0 && document.getElementById('worksheetList').children[0].textContent !== 'Chargement...') {
                 console.log(`Admin: Student ${student} already selected.`);
                 return; // Avoid unnecessary reloads if already on this student
             }
            console.log(`Admin: Selecting student: ${student}`);
            currentStudent = student;
            currentWorksheetId = null; // Deselect worksheet when changing student
            isNewWorksheet = false; // Reset flag

            // Update UI tabs
            document.getElementById('shamTab').classList.toggle('active', student === 'sham');
            document.getElementById('celineTab').classList.toggle('active', student === 'celine');

            // Reload worksheet list for the selected student
            loadWorksheetList();

            // Reset the edit form
            resetEditForm();
            document.getElementById('saveStatus').textContent = 'Prêt';
        }

         function resetEditForm() {
             document.getElementById('worksheetTitle').value = '';
             document.getElementById('worksheetDescription').value = '';
             document.getElementById('worksheetDate').value = '';
             // Ensure editor is ready before setting content
             if (editor) {
                 editor.setContent('');
                 editor.setDirty(false); // Mark as not modified
             } else {
                 // Fallback if editor isn't ready yet
                 document.getElementById('worksheetContent').value = '';
             }
             document.getElementById('saveStatus').textContent = 'Prêt';
         }


        function selectWorksheet(worksheetId) {
             if (currentWorksheetId === worksheetId && !isNewWorksheet) {
                  console.log(`Admin: Worksheet ${worksheetId} already selected.`);
                  return; // Avoid reloading if already selected
             }
            console.log(`Admin: Selecting worksheet: ${worksheetId} for student ${currentStudent}`);
            currentWorksheetId = worksheetId;
            isNewWorksheet = false;

            // Update active item in the list
            const listItems = document.querySelectorAll('.worksheet-list .worksheet-item');
            listItems.forEach(item => {
                item.classList.toggle('active', item.dataset.id === worksheetId);
            });

            // Fetch worksheet data from Firebase
            const worksheetRef = database.ref(`worksheets/${currentStudent}/${worksheetId}`);
            worksheetRef.once('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    console.log(`Admin: Loading data for worksheet ${worksheetId}`);
                    document.getElementById('worksheetTitle').value = data.title || '';
                    document.getElementById('worksheetDescription').value = data.description || '';
                    document.getElementById('worksheetDate').value = data.date || '';

                    // Set content in TinyMCE editor
                    if (editor) {
                         editor.setContent(data.content || '');
                         editor.setDirty(false); // Mark as not modified initially
                         document.getElementById('saveStatus').textContent = 'Chargé';
                    } else {
                         console.warn("Admin: TinyMCE editor not ready when trying to set content.");
                         document.getElementById('worksheetContent').value = data.content || ''; // Fallback
                         document.getElementById('saveStatus').textContent = 'Chargé (Editeur non prêt)';
                    }

                } else {
                    console.error(`Admin: Data not found for worksheet ${worksheetId}`);
                    showNotification(`Erreur: Feuille ${worksheetId} non trouvée.`, 'error');
                    resetEditForm();
                    currentWorksheetId = null; // Deselect if not found
                    loadWorksheetList(); // Refresh list
                }
            }).catch(error => {
                 console.error(`Admin: Error loading worksheet ${worksheetId}:`, error);
                 showNotification('Erreur lors du chargement de la feuille.', 'error');
                 resetEditForm();
            });
        }

        function createNewWorksheet() {
            console.log(`Admin: Creating new worksheet for student ${currentStudent}`);
            isNewWorksheet = true;
            // Generate a unique ID using Firebase push keys for better collision avoidance
            currentWorksheetId = database.ref(`worksheets/${currentStudent}`).push().key;
            console.log(`Admin: New worksheet ID generated: ${currentWorksheetId}`);


            // Reset form fields for the new worksheet
            document.getElementById('worksheetTitle').value = 'Nouvelle Feuille';
            document.getElementById('worksheetDescription').value = '';
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('worksheetDate').value = today;

            // Default content for new worksheet
            const defaultContent = `<section id="intro">
    <h2><span class="emoji">📝</span> Nouveau Titre</h2>
    <p>Commencez à ajouter du contenu ici...</p>
</section>
<div class="exercise">
    <h3>Exercice 1</h3>
    <p>Question:</p>
    <input type="text" class="answer-input" id="answer1a" placeholder="Réponse pour Exercice 1a">
</div>`;
            if (editor) {
                 editor.setContent(defaultContent);
                 editor.setDirty(true); // Mark as needing save immediately
            } else {
                 document.getElementById('worksheetContent').value = defaultContent;
            }

            document.getElementById('saveStatus').textContent = 'Nouvelle feuille - Non sauvegardée';

            // Update the list visually - add temporary item and make active
            const worksheetList = document.getElementById('worksheetList');
            const listItems = worksheetList.querySelectorAll('.worksheet-item');
            listItems.forEach(item => item.classList.remove('active')); // Deactivate others

            const newItem = document.createElement('div');
            newItem.className = 'worksheet-item active';
            newItem.dataset.id = currentWorksheetId; // Set the new ID
            newItem.textContent = 'Nouvelle Feuille (en cours...)';
            newItem.onclick = () => selectWorksheet(currentWorksheetId);
            worksheetList.prepend(newItem); // Add to top of list

            // Focus the title field for immediate editing
            document.getElementById('worksheetTitle').focus();
            document.getElementById('worksheetTitle').select();
        }

        // NOTE: generateWorksheetId is no longer needed as we use Firebase push keys

        function saveWorksheet() {
            if (!currentWorksheetId) {
                showNotification('Erreur: Aucune feuille sélectionnée ou créée.', 'error');
                console.error("Admin: Save attempt with no currentWorksheetId.");
                return;
            }
             if (!editor) {
                 showNotification("Erreur: L'éditeur n'est pas prêt.", 'error');
                 console.error("Admin: Save attempt before editor is ready.");
                 return;
             }

            const title = document.getElementById('worksheetTitle').value.trim();
            const description = document.getElementById('worksheetDescription').value.trim();
            const date = document.getElementById('worksheetDate').value;
            const content = editor.getContent(); // Get content from TinyMCE

            if (!title) {
                showNotification('Veuillez entrer un titre pour la feuille.', 'error');
                document.getElementById('worksheetTitle').focus();
                return;
            }
            if (!content) {
                 if (!confirm("Le contenu de la feuille est vide. Voulez-vous sauvegarder quand même ?")) {
                      return;
                 }
            }


            console.log(`Admin: Saving worksheet ${currentWorksheetId} for student ${currentStudent}...`);
            document.getElementById('saveStatus').textContent = 'Sauvegarde en cours...';

            // Data object to save/update
            const worksheetData = {
                title: title,
                description: description,
                date: date,
                content: content,
                lastUpdated: firebase.database.ServerValue.TIMESTAMP // Use server timestamp
            };

            // If it was a new worksheet, ensure the progress node is initialized
            // We use 'update' which allows creating the initial node safely
             if (isNewWorksheet) {
                 worksheetData.progress = {}; // Initialize progress for new sheets
             }


            // Reference to the specific worksheet node
            const worksheetRef = database.ref(`worksheets/${currentStudent}/${currentWorksheetId}`);

            // Use update() to save - it creates or overwrites specified fields
            worksheetRef.update(worksheetData)
                .then(() => {
                    console.log(`Admin: Worksheet ${currentWorksheetId} saved successfully.`);
                    document.getElementById('saveStatus').textContent = 'Sauvegardé';
                    if(editor) editor.setDirty(false); // Mark editor as clean
                     // If autosave is enabled, remove the draft
                     if (editor && editor.plugins.autosave) {
                          editor.plugins.autosave.removeDraft();
                     }

                    showNotification('Feuille de travail sauvegardée avec succès !', 'success');

                    // If it was a new sheet, refresh the list to show the final title
                     if (isNewWorksheet) {
                         isNewWorksheet = false; // It's saved now, no longer "new"
                         loadWorksheetList(); // Refresh list to show proper title and make it selectable
                         // Re-select the item after list refresh
                         setTimeout(() => {
                              const listItems = document.querySelectorAll('.worksheet-list .worksheet-item');
                              listItems.forEach(item => {
                                   item.classList.toggle('active', item.dataset.id === currentWorksheetId);
                              });
                         }, 300); // Small delay for list refresh
                     } else {
                          // Update title in the list if it changed
                           const listItem = document.querySelector(`.worksheet-list .worksheet-item[data-id="${currentWorksheetId}"]`);
                           if (listItem && listItem.textContent !== title) {
                                listItem.textContent = title;
                           }
                     }
                })
                .catch((error) => {
                    console.error(`Admin: Error saving worksheet ${currentWorksheetId}:`, error);
                    document.getElementById('saveStatus').textContent = 'Erreur de sauvegarde';
                    showNotification(`Erreur lors de la sauvegarde: ${error.message}`, 'error');
                });
        }

        function previewWorksheet() {
            if (!currentWorksheetId || isNewWorksheet) {
                 // Ask to save if it's a new, unsaved sheet
                 if (isNewWorksheet && confirm("Veuillez d'abord enregistrer la nouvelle feuille avant de prévisualiser. Enregistrer maintenant ?")) {
                      saveWorksheet();
                      // Need to wait for save to complete before opening preview? Or just let save happen async?
                      // Let's allow opening preview immediately after initiating save for faster workflow.
                 } else if (isNewWorksheet) {
                     return; // User cancelled save
                 } else {
                      showNotification('Veuillez sélectionner ou enregistrer une feuille avant de prévisualiser.', 'error');
                      return;
                 }
            }

             // Optionally save changes before previewing existing sheet
             if (editor && editor.isDirty()) {
                 if (confirm("Vous avez des modifications non enregistrées. Enregistrer avant de prévisualiser ?")) {
                      saveWorksheet();
                      // As above, let save happen async and open preview immediately
                 } else {
                     console.log("Admin: Preview cancelled due to unsaved changes.");
                     return; // User chose not to save
                 }
             }


            console.log(`Admin: Opening preview for worksheet ${currentWorksheetId} of student ${currentStudent}`);
            // Construct the URL for the student's worksheet view
            const previewUrl = `worksheet.html?student=${currentStudent}&id=${currentWorksheetId}`;
            window.open(previewUrl, '_blank'); // Open in a new tab
        }

        function confirmDelete() {
            if (!currentWorksheetId || isNewWorksheet) {
                showNotification('Veuillez sélectionner une feuille existante à supprimer.', 'error');
                return;
            }

            const worksheetTitle = document.getElementById('worksheetTitle').value || 'cette feuille';
            if (confirm(`Êtes-vous sûr de vouloir supprimer "${worksheetTitle}"? Cette action est irréversible.`)) {
                console.log(`Admin: Attempting to delete worksheet ${currentWorksheetId} for student ${currentStudent}`);
                // Reference to the worksheet node
                const worksheetRef = database.ref(`worksheets/${currentStudent}/${currentWorksheetId}`);

                // Remove the data at that node
                worksheetRef.remove()
                    .then(() => {
                        console.log(`Admin: Worksheet ${currentWorksheetId} deleted successfully.`);
                        showNotification('Feuille de travail supprimée.', 'success');

                        // Reset UI after deletion
                        currentWorksheetId = null;
                        isNewWorksheet = false;
                        resetEditForm();
                        loadWorksheetList(); // Refresh the list
                    })
                    .catch((error) => {
                        console.error(`Admin: Error deleting worksheet ${currentWorksheetId}:`, error);
                        showNotification(`Erreur lors de la suppression: ${error.message}`, 'error');
                    });
            } else {
                 console.log("Admin: Delete cancelled by user.");
            }
        }

        function loadTemplate(templateName) {
            console.log(`Admin: Loading template '${templateName}'...`);
            // Define templates (keep this or fetch from DB/JSON file later)
            const templates = {
                 'aire': { /* ... template content ... */ },
                 'fractions': { /* ... template content ... */ },
                 'geometrie': { /* ... template content ... */ }
                // Make sure the content is defined as in your original file
                // Example for 'aire':
                'aire': {
                     title: "Aire et Conversions",
                     description: "Mesures d'aire et conversions décimales",
                     content: `<section id="intro"><h2><span class="emoji">📝</span> Introduction</h2><p>Cette feuille de révision va t'aider à maîtriser:</p><ul><li>Les unités de mesure d'aire</li><li>Comment choisir l'unité appropriée</li><li>Comment mesurer et calculer l'aire</li><li>Comment convertir entre décimales, fractions et pourcentages</li></ul></section><section id="unitesMesure"><h2><span class="emoji">📏</span> Les Unités de Mesure (Aire)</h2><p>L'aire est la mesure de la surface occupée par une figure plane. On l'exprime généralement en unités carrées.</p><div class="exercise"><h3>Les unités d'aire principales:</h3><table><tr><th>Unité</th><th>Symbole</th><th>Équivalence</th><th>Exemple d'utilisation</th></tr><tr><td>Kilomètre carré</td><td>km²</td><td>1 000 000 m²</td><td>Surface d'une ville</td></tr><tr><td>Hectare</td><td>ha</td><td>10 000 m²</td><td>Surface d'un terrain agricole</td></tr><tr><td>Are</td><td>a</td><td>100 m²</td><td>Petite parcelle de terrain</td></tr><tr><td>Mètre carré</td><td>m²</td><td>Unité de base</td><td>Surface d'une chambre</td></tr><tr><td>Décimètre carré</td><td>dm²</td><td>0,01 m²</td><td>Surface d'un livre</td></tr><tr><td>Centimètre carré</td><td>cm²</td><td>0,0001 m²</td><td>Surface d'un timbre</td></tr><tr><td>Millimètre carré</td><td>mm²</td><td>0,000001 m²</td><td>Section d'un fil électrique</td></tr></table></div><div class="exercise"><h3>Exercice 1: Classer les unités d'aire</h3><p>Classe les unités suivantes dans les bonnes catégories:</p><p><strong>Unités disponibles:</strong> km², ha, m², a, cm², mm², dm²</p><p>a) Grandes surfaces:</p><input type="text" class="answer-input" id="answer1a" placeholder="Ta réponse ici..."><p>b) Surfaces moyennes:</p><input type="text" class="answer-input" id="answer1b" placeholder="Ta réponse ici..."><p>c) Petites surfaces:</p><input type="text" class="answer-input" id="answer1c" placeholder="Ta réponse ici..."></div></section>`
                 },
                 // Add other templates back here...
            };


            if (!templates[templateName]) {
                showNotification('Erreur: Modèle non trouvé.', 'error');
                console.error(`Admin: Template '${templateName}' not found.`);
                return;
            }

            // Create a new worksheet using the template content
            createNewWorksheet(); // Generates new ID, sets isNewWorksheet=true

            // Apply template data (override defaults from createNewWorksheet)
            const templateData = templates[templateName];
            document.getElementById('worksheetTitle').value = templateData.title || 'Nouveau (Modèle)';
            document.getElementById('worksheetDescription').value = templateData.description || '';
            if (editor) {
                editor.setContent(templateData.content || '<p>Modèle vide.</p>');
                editor.setDirty(true); // Mark as needing save
            } else {
                 document.getElementById('worksheetContent').value = templateData.content || '';
            }

            document.getElementById('saveStatus').textContent = 'Modèle chargé - Non sauvegardé';
            showNotification(`Modèle '${templateData.title}' chargé comme nouvelle feuille.`, 'success');
            document.getElementById('worksheetTitle').focus(); // Focus title after loading template
        }

        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            if (!notification) return; // Exit if notification element doesn't exist

            notification.textContent = message;
            // Ensure previous type classes are removed before adding new one
             notification.className = 'notification'; // Reset class list
             notification.classList.add(type); // Add success or error class
            notification.classList.add('show'); // Trigger animation/display

            // Auto-hide after 3 seconds
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Opens index.html in a new tab
        function goToHome() {
            window.open('index.html', '_blank');
        }

        // Note: The old 'DOMContentLoaded' listener is removed.
        // Initialization now happens inside the onAuthStateChanged check.

    </script>
