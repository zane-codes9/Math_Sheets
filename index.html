<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feuilles de Révision Mathématiques - Login</title>
    <!-- Firebase SDK -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.2/firebase-app-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.2/firebase-database-compat.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.2/firebase-auth-compat.min.js"></script>

    <style>
        /* Styles généraux */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center; /* Center the container */
        }

        .container {
            max-width: 500px; /* Adjusted max-width for a login form */
            width: 90%;      /* Make it responsive */
            margin: 20px;    /* Added margin */
            padding: 30px;   /* Increased padding */
            background-color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); /* Softer shadow */
            border-radius: 10px;
            text-align: center;
        }

        /* En-tête stylisée */
        .header {
            background-color: #4e5de3;
            color: white;
            padding: 15px 20px; /* Adjusted padding */
            border-radius: 10px 10px 0 0; /* Rounded top corners */
            margin: -30px -30px 25px -30px; /* Extend to container edges */
            text-align: center;
        }

         h1 {
            margin: 0;
            font-size: 1.8em; /* Slightly smaller */
        }
         h2 {
             color: #4e5de3;
             margin-bottom: 20px;
         }

        /* Login Form Styles */
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            text-align: left; /* Align labels left */
        }
        input[type="email"],
        input[type="password"] {
            width: 100%; /* Full width */
            padding: 10px; /* More padding */
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box; /* Include padding in width */
            font-size: 1em;
        }
        button.login-btn {
            padding: 12px 25px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background-color 0.3s ease;
        }
         button.login-btn:hover {
             background-color: #45a049;
         }
         button.logout-btn {
             padding: 10px 20px;
             background-color: #f44336;
             color: white;
             border: none;
             border-radius: 5px;
             cursor: pointer;
             margin-top: 15px;
             font-size: 1em;
             transition: background-color 0.3s ease;
         }
          button.logout-btn:hover {
              background-color: #d32f2f;
          }

        #loginError {
            color: #d32f2f; /* Darker red */
            margin-top: 15px;
            font-weight: bold;
            min-height: 1.2em; /* Prevent layout shift */
        }

        #loggedInSection p {
            margin: 10px 0;
            font-size: 1.1em;
        }
         #loggedInSection span {
             font-weight: bold;
             color: #4e5de3;
         }

        /* Footer Styles */
        footer {
            text-align: center;
            margin-top: 30px;
            color: #777;
            padding: 10px;
            font-size: 0.9em;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Feuilles de Révision Mathématiques</h1>
    </div>

    <!-- Login Form Section -->
    <div id="loginSection">
        <h2>Connexion</h2>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Entrez votre email">
        </div>
        <div>
            <label for="password">Mot de passe:</label>
            <input type="password" id="password" placeholder="Entrez votre mot de passe">
        </div>
        <button onclick="loginUser()" class="login-btn">Se connecter</button>
        <p id="loginError"></p> <!-- For displaying login errors -->
    </div>

    <!-- Logged In Section (Hidden by default) -->
    <div id="loggedInSection" style="display: none;">
        <h2>Bienvenue !</h2>
        <p>Connecté en tant que : <span id="userEmail"></span></p>
        <p>Redirection vers votre tableau de bord...</p>
        <button onclick="logoutUser()" class="logout-btn">Se déconnecter</button>
    </div>

    <footer>
        <p>© 2023 Feuilles de Révision</p>
    </footer>
</div>

<script>
    // Configuration Firebase - Using your provided details
    const firebaseConfig = {
        apiKey: "AIzaSyBnFB7ZoqliCOF1a57G0cbLOEoyMGzf9QI", // Your actual API Key
        authDomain: "sham-s-worksheets.firebaseapp.com",
        databaseURL: "https://sham-s-worksheets-default-rtdb.firebaseio.com",
        projectId: "sham-s-worksheets",
        storageBucket: "sham-s-worksheets.firebasestorage.app",
        messagingSenderId: "408757720197",
        appId: "1:408757720197:web:fd63c16cfc0fb3afc185ec",
        measurementId: "G-CZ7BSB67LV"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(); // Get Authentication service reference
    // const database = firebase.database(); // You might need this later on other pages

    // --- LOGIN/LOGOUT/REDIRECT LOGIC ---

    // Function to handle user login
    function loginUser() {
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginError = document.getElementById('loginError');

        const email = emailInput.value.trim(); // Trim whitespace
        const password = passwordInput.value;

        loginError.textContent = ''; // Clear previous errors

        if (!email || !password) {
            loginError.textContent = 'Veuillez entrer votre email et mot de passe.';
            return;
        }

        // Sign in using Firebase Auth
        auth.signInWithEmailAndPassword(email, password)
            .then((userCredential) => {
                // Login successful - onAuthStateChanged will handle the redirect
                console.log('Login successful for:', userCredential.user.email);
                // Optionally clear password field after successful attempt starts
                // passwordInput.value = '';
            })
            .catch((error) => {
                // Login failed - display error
                console.error("Login Error Code:", error.code);
                console.error("Login Error Message:", error.message);
                 if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                     loginError.textContent = 'Email ou mot de passe incorrect.';
                 } else if (error.code === 'auth/invalid-email') {
                     loginError.textContent = 'Format d\'email invalide.';
                 } else {
                     loginError.textContent = 'Erreur de connexion. Veuillez réessayer.'; // Generic error
                 }
            });
    }

    // Function to handle user logout
    function logoutUser() {
        auth.signOut().then(() => {
            // Sign-out successful - onAuthStateChanged will update the UI
            console.log('User signed out successfully.');
        }).catch((error) => {
            console.error('Sign out error:', error);
            alert(`Erreur de déconnexion: ${error.message}`);
        });
    }

    // Firebase Authentication Observer: Runs on page load and when login state changes
    auth.onAuthStateChanged(user => {
        const loginSection = document.getElementById('loginSection');
        const loggedInSection = document.getElementById('loggedInSection');
        const userEmailSpan = document.getElementById('userEmail');

        if (user) {
            // --- USER IS SIGNED IN ---
            console.log(`User is signed in: ${user.email} (UID: ${user.uid})`);

            // Hide login form, show logged-in info
            loginSection.style.display = 'none';
            loggedInSection.style.display = 'block';
            userEmailSpan.textContent = user.email;

            // --- DEFINE USER IDs ---
            const ADMIN_UID = "MH6iCAGIYdYIbVCc1YZPaWccHYg2"; // Your UID
            const SHAM_UID = "wIZOcjwFwtONzhxdlENAR3oHplu1";  // Sham's UID
            const CELINE_UID = "kIM5AGVYGFfTLKaUffO37FPfia63"; // Celine's UID
            // --- END OF USER IDs ---

            let redirectUrl = null;
            let userType = "Unknown";

            // Determine user type and redirect URL based on UID
            if (user.uid === ADMIN_UID) {
                userType = "Admin";
                redirectUrl = 'admin.html';
            } else if (user.uid === SHAM_UID) {
                userType = "Sham";
                redirectUrl = 'dashboard.html?student=sham';
            } else if (user.uid === CELINE_UID) {
                userType = "Celine";
                redirectUrl = 'dashboard.html?student=celine';
            }

            // Perform redirection if user is recognized
            if (redirectUrl) {
                console.log(`Redirecting ${userType} to ${redirectUrl}...`);
                // Wait 1.5 seconds before redirecting
                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 1500);
            } else {
                // User UID does not match known UIDs
                console.error(`CRITICAL: Logged-in user UID (${user.uid}) does not match any known roles (Admin, Sham, Celine). Logging out.`);
                alert("Votre compte n'est pas reconnu pour cette application. Déconnexion.");
                logoutUser(); // Log out the unrecognized user
            }

        } else {
            // --- USER IS SIGNED OUT ---
            console.log('No user signed in. Displaying login form.');
            // Show login form, hide logged-in info
            loginSection.style.display = 'block';
            loggedInSection.style.display = 'none';
            userEmailSpan.textContent = '';
        }
    });

</script>

</body>
</html>
