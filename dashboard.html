    <script>
        // Configuration Firebase - MAKE SURE THESE DETAILS ARE CORRECT FOR YOUR PROJECT
        const firebaseConfig = {
            apiKey: "AIzaSyBnFB7ZoqliCOF1a57G0cbLOEoyMGzf9QI", // Use your actual API Key
            authDomain: "sham-s-worksheets.firebaseapp.com",
            databaseURL: "https://sham-s-worksheets-default-rtdb.firebaseio.com",
            projectId: "sham-s-worksheets",
            storageBucket: "sham-s-worksheets.firebasestorage.app",
            messagingSenderId: "408757720197",
            appId: "1:408757720197:web:fd63c16cfc0fb3afc185ec",
            measurementId: "G-CZ7BSB67LV"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database(); // Database reference
        const auth = firebase.auth(); // Authentication service reference

        // --- DEFINE USER IDs (Paste the correct UIDs here) ---
        const ADMIN_UID = "MH6iCAGIYdYIbVCc1YZPaWccHYg2"; // Your UID
        const SHAM_UID = "wIZOcjwFwtONzhxdlENAR3oHplu1";  // Sham's UID
        const CELINE_UID = "kIM5AGVYGFfTLKaUffO37FPfia63"; // Celine's UID
        // --- END OF USER IDs ---

        // Get the target student from the URL parameter (?student=...)
        const urlParams = new URLSearchParams(window.location.search);
        const targetStudent = urlParams.get('student'); // Will be 'sham' or 'celine'

        // --- Authentication Check ---
        auth.onAuthStateChanged(user => {
            if (!user) {
                // 1. NO USER LOGGED IN: Redirect to login page immediately
                console.log('Dashboard: No user logged in. Redirecting to index.html');
                window.location.href = 'index.html';
            } else {
                // 2. USER IS LOGGED IN: Verify they are allowed to see this specific dashboard
                console.log(`Dashboard: User ${user.uid} is logged in. Checking authorization for student: ${targetStudent}`);

                let isAuthorized = false;
                let expectedUid = null;

                if (targetStudent === 'sham') {
                    expectedUid = SHAM_UID;
                } else if (targetStudent === 'celine') {
                    expectedUid = CELINE_UID;
                }
                // Add Admin check if Admins should also be able to view student dashboards directly
                 // else if (user.uid === ADMIN_UID) {
                 //    isAuthorized = true; // Optional: Allow admin direct view
                 // }


                // Check if the logged-in user's UID matches the expected UID for this dashboard
                if (expectedUid && user.uid === expectedUid) {
                    isAuthorized = true;
                }

                if (isAuthorized) {
                    // 3. AUTHORIZED: Proceed to load the dashboard content
                    console.log(`Dashboard: User ${user.uid} authorized for ${targetStudent}'s dashboard.`);
                    initializeDashboard(); // Call the function that sets up the page
                } else {
                    // 4. NOT AUTHORIZED: Logged in, but wrong user for this dashboard
                    console.error(`Dashboard: Authorization FAILED. User ${user.uid} attempted to access ${targetStudent}'s dashboard.`);
                    alert("Accès Refusé. Vous n'êtes pas autorisé à voir ce tableau de bord.");

                    // Redirect the user appropriately
                    if (user.uid === SHAM_UID) {
                        window.location.href = 'dashboard.html?student=sham'; // Send Sham to her own dashboard
                    } else if (user.uid === CELINE_UID) {
                        window.location.href = 'dashboard.html?student=celine'; // Send Celine to her own dashboard
                    } else if (user.uid === ADMIN_UID) {
                         window.location.href = 'admin.html'; // Send Admin to admin page
                    } else {
                         // Unknown user - logout and send to index
                        auth.signOut().then(() => { window.location.href = 'index.html'; });
                    }
                }
            }
        });
        // --- End of Authentication Check ---


        // Function to set up and load the dashboard content (only called if authorized)
        function initializeDashboard() {
            // Make sure the target student is valid before proceeding
             if (!targetStudent || (targetStudent !== 'sham' && targetStudent !== 'celine')) {
                 console.error('Dashboard: Invalid or missing student parameter in URL.');
                 alert("Erreur: Le nom de l'élève est manquant ou invalide dans l'URL.");
                 window.location.href = 'index.html'; // Or handle error differently
                 return;
             }
             setupStudentUI();
             loadWorksheets();
        }

        // Configurer l'interface utilisateur en fonction de l'étudiant
        function setupStudentUI() {
            const studentName = document.getElementById('studentName');
            const studentEmoji = document.getElementById('studentEmoji');

            if (targetStudent === 'sham') {
                studentName.textContent = 'Sham';
                studentEmoji.textContent = '👧';
                document.title = 'Tableau de Bord de Sham';
            } else if (targetStudent === 'celine') {
                studentName.textContent = 'Celine';
                studentEmoji.textContent = '👩';
                document.title = 'Tableau de Bord de Celine';
            }
            // Add admin case here if needed
            // else {
            //      studentName.textContent = 'Admin View'; // Example if admin views directly
            // }
        }

        // Charger les feuilles de travail de l'étudiant
        function loadWorksheets() {
            const worksheetsRef = database.ref(`worksheets/${targetStudent}`); // Use targetStudent from URL

            worksheetsRef.once('value', (snapshot) => {
                const worksheetsList = document.getElementById('worksheetsList');
                worksheetsList.innerHTML = ''; // Clear any previous content (like loading message)

                const data = snapshot.val();

                if (!data) {
                    // Aucune feuille de travail disponible
                    const noWorksheets = document.createElement('div');
                    noWorksheets.className = 'no-worksheets';
                    noWorksheets.innerHTML = `
                        <p>Aucune feuille de travail disponible pour le moment.</p>
                        <p>Revenez bientôt pour de nouvelles feuilles! 📚</p>
                    `;
                    worksheetsList.appendChild(noWorksheets);
                    console.log(`Dashboard: No worksheets found for ${targetStudent}.`);
                    return;
                }

                console.log(`Dashboard: Loading worksheets for ${targetStudent}...`);
                // Créer une carte pour chaque feuille de travail
                Object.keys(data).sort((a, b) => {
                     // Optional: Sort worksheets, e.g., by date if available, otherwise by title
                     const dateA = data[a].date || '0';
                     const dateB = data[b].date || '0';
                     if (dateB !== dateA) return dateB.localeCompare(dateA); // Newest first
                     return (data[a].title || '').localeCompare(data[b].title || ''); // Then by title
                 }).forEach(worksheetId => {
                    const worksheet = data[worksheetId];

                    // Calculer la progression (Ensure progress exists and is an object)
                    let progress = 0;
                    let totalQuestions = 0;
                    let answeredQuestions = 0;

                    if (worksheet.progress && typeof worksheet.progress === 'object') {
                        // Count inputs within the dynamically loaded content
                        // Create a temporary div to parse the HTML content
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = worksheet.content || ''; // Use worksheet content
                        const inputsInContent = tempDiv.querySelectorAll('.answer-input');
                        totalQuestions = inputsInContent.length;

                        // Count answered questions based on saved progress data
                        answeredQuestions = Object.keys(worksheet.progress)
                                                .filter(key => worksheet.progress[key] !== null && String(worksheet.progress[key]).trim() !== '')
                                                .length;

                        // Ensure answered questions don't exceed total identified questions
                        answeredQuestions = Math.min(answeredQuestions, totalQuestions);

                        if (totalQuestions > 0) {
                            progress = Math.round((answeredQuestions / totalQuestions) * 100);
                        } else {
                           // If no inputs found in content, check if progress object has keys anyway
                           // This might indicate old data or inputs removed from content
                           if (Object.keys(worksheet.progress).length > 0) {
                               // Decide how to handle this - maybe show 100% if progress exists but no inputs?
                               // Or calculate based on keys in progress object? Let's assume 0% if no inputs found.
                               progress = 0;
                           }
                        }

                    } else {
                         // If no progress object, check content for inputs to determine total questions
                         const tempDiv = document.createElement('div');
                         tempDiv.innerHTML = worksheet.content || '';
                         const inputsInContent = tempDiv.querySelectorAll('.answer-input');
                         totalQuestions = inputsInContent.length;
                         answeredQuestions = 0;
                         progress = 0;
                    }


                    // Créer la carte de la feuille de travail
                    const card = document.createElement('div');
                    card.className = 'worksheet-card';
                    card.onclick = () => openWorksheet(worksheetId); // Keep original function name

                    card.innerHTML = `
                        <div class="worksheet-title">${worksheet.title || 'Feuille sans titre'}</div>
                        <div class="worksheet-date">${worksheet.date ? new Date(worksheet.date).toLocaleDateString('fr-FR') : 'Date non spécifiée'}</div>
                        <div class="worksheet-desc">${worksheet.description || 'Description non disponible'}</div>
                        <div class="progress-bar" title="${progress}% complété (${answeredQuestions}/${totalQuestions})">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                        <div class="worksheet-footer">
                            <span>${progress}% complété</span>
                            <span>${answeredQuestions}/${totalQuestions} questions</span>
                        </div>
                    `;

                    worksheetsList.appendChild(card);
                });
            }).catch(error => {
                 console.error(`Dashboard: Error loading worksheets for ${targetStudent}:`, error);
                 document.getElementById('worksheetsList').innerHTML = `<p style="color: red;">Erreur lors du chargement des feuilles de travail.</p>`;
            });
        }

        // Ouvrir une feuille de travail (Navigates to worksheet page)
        function openWorksheet(worksheetId) {
            // Pass the currently viewed student name in the URL
            window.location.href = `worksheet.html?student=${targetStudent}&id=${worksheetId}`;
        }

        // Retourner à la page d'accueil (index.html - Login Page)
        function goHome() {
            // Consider logging out or just going to index page
            // For simplicity, let's just go to index.html
            window.location.href = 'index.html';
             // If you want to ensure logout:
             // auth.signOut().then(() => { window.location.href = 'index.html'; });
        }

        // Note: The old 'DOMContentLoaded' listener is removed.
        // Initialization now happens inside the onAuthStateChanged check.

    </script>
