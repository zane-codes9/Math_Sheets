    <script>
        // Configuration Firebase - MAKE SURE THESE DETAILS ARE CORRECT FOR YOUR PROJECT
        const firebaseConfig = {
            apiKey: "AIzaSyBnFB7ZoqliCOF1a57G0cbLOEoyMGzf9QI", // Use your actual API Key
            authDomain: "sham-s-worksheets.firebaseapp.com",
            databaseURL: "https://sham-s-worksheets-default-rtdb.firebaseio.com",
            projectId: "sham-s-worksheets",
            storageBucket: "sham-s-worksheets.firebasestorage.app",
            messagingSenderId: "408757720197",
            appId: "1:408757720197:web:fd63c16cfc0fb3afc185ec",
            measurementId: "G-CZ7BSB67LV"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database(); // Database reference
        const auth = firebase.auth(); // Authentication service reference

        // --- DEFINE USER IDs (Paste the correct UIDs here) ---
        const ADMIN_UID = "MH6iCAGIYdYIbVCc1YZPaWccHYg2"; // Your UID
        const SHAM_UID = "wIZOcjwFwtONzhxdlENAR3oHplu1";  // Sham's UID
        const CELINE_UID = "kIM5AGVYGFfTLKaUffO37FPfia63"; // Celine's UID
        // --- END OF USER IDs ---

        // Get parameters from the URL (?student=...&id=...)
        const urlParams = new URLSearchParams(window.location.search);
        const targetStudent = urlParams.get('student');
        const worksheetId = urlParams.get('id');

        // Global references (will be set after authorization)
        let worksheetRef = null;
        let progressRef = null;

        // --- Authentication Check ---
        auth.onAuthStateChanged(user => {
            if (!user) {
                // 1. NO USER LOGGED IN: Redirect to login page
                console.log('Worksheet: No user logged in. Redirecting to index.html');
                window.location.href = 'index.html';
            } else {
                // 2. USER IS LOGGED IN: Verify authorization for this student's worksheet
                console.log(`Worksheet: User ${user.uid} is logged in. Checking authorization for student: ${targetStudent}, worksheet: ${worksheetId}`);

                // Basic check for required URL parameters
                if (!targetStudent || !worksheetId) {
                     console.error('Worksheet: Missing student or worksheet ID in URL.');
                     alert("Erreur: Le nom de l'élève ou l'ID de la feuille est manquant dans l'URL.");
                     window.location.href = 'index.html'; // Redirect if params missing
                     return;
                 }

                let isAuthorized = false;
                let expectedUid = null;

                if (targetStudent === 'sham') {
                    expectedUid = SHAM_UID;
                } else if (targetStudent === 'celine') {
                    expectedUid = CELINE_UID;
                }
                 // Optional: Allow admin direct view/edit if needed (DB rules already allow it)
                 // else if (user.uid === ADMIN_UID) {
                 //    isAuthorized = true;
                 // }


                // Check if the logged-in user's UID matches the expected UID for this student
                if (expectedUid && user.uid === expectedUid) {
                    isAuthorized = true;
                }

                if (isAuthorized) {
                    // 3. AUTHORIZED: Set up database references and load worksheet
                    console.log(`Worksheet: User ${user.uid} authorized for ${targetStudent}'s worksheet ${worksheetId}.`);
                    // Set the database references now that we know the student and ID are valid for this user
                    worksheetRef = database.ref(`worksheets/${targetStudent}/${worksheetId}`);
                    progressRef = database.ref(`worksheets/${targetStudent}/${worksheetId}/progress`);
                    loadWorksheetContent(); // Load the actual content
                } else {
                    // 4. NOT AUTHORIZED: Logged in, but wrong user for this student's worksheet
                    console.error(`Worksheet: Authorization FAILED. User ${user.uid} attempted to access ${targetStudent}'s worksheet ${worksheetId}.`);
                    alert("Accès Refusé. Vous n'êtes pas autorisé à voir cette feuille de travail.");

                    // Redirect the user appropriately
                    if (user.uid === SHAM_UID) {
                        window.location.href = `dashboard.html?student=sham`;
                    } else if (user.uid === CELINE_UID) {
                        window.location.href = `dashboard.html?student=celine`;
                    } else if (user.uid === ADMIN_UID) {
                         window.location.href = 'admin.html';
                    } else {
                        auth.signOut().then(() => { window.location.href = 'index.html'; });
                    }
                }
            }
        });
        // --- End of Authentication Check ---


        // Function to load the worksheet content (only called if authorized)
        function loadWorksheetContent() {
            if (!worksheetRef) {
                 console.error("Worksheet: Cannot load content, worksheetRef is not set.");
                 displayError("Une erreur interne s'est produite (référence de base de données manquante).");
                 return;
            }

            worksheetRef.once('value', (snapshot) => {
                const worksheetData = snapshot.val();

                if (!worksheetData) {
                    // Worksheet data doesn't exist at this path
                    console.error(`Worksheet: No data found for worksheets/${targetStudent}/${worksheetId}`);
                    displayError('Cette feuille de travail n\'existe pas ou a été supprimée.');
                    return;
                }

                // Update page title and header info
                document.title = worksheetData.title || `Feuille: ${worksheetId}`;
                document.getElementById('worksheetTitle').textContent = worksheetData.title || 'Feuille de Révision';
                document.getElementById('worksheetSubtitle').textContent = worksheetData.description || '';
                document.getElementById('sheetId').textContent = worksheetId; // Display the ID in status bar

                // Set character emoji based on student
                 const characterEmoji = document.getElementById('characterEmoji');
                 if(targetStudent === 'sham') characterEmoji.textContent = '👧';
                 else if(targetStudent === 'celine') characterEmoji.textContent = '👩';
                 // Add admin case if needed

                // Load the main HTML content
                const contentContainer = document.getElementById('worksheetContent');
                if (worksheetData.content) {
                    contentContainer.innerHTML = worksheetData.content; // Inject the saved HTML
                    // Add event listeners AFTER injecting HTML
                    setupAnswerFields();
                    // Load any previously saved answers for this worksheet
                    loadSavedAnswers();
                } else {
                    console.warn(`Worksheet: No 'content' found for ${worksheetId}`);
                    displayError('Cette feuille de travail est vide.');
                }

            }).catch(error => {
                 console.error(`Worksheet: Error fetching worksheet data for ${worksheetId}:`, error);
                 displayError("Erreur lors du chargement des données de la feuille de travail.");
            });
        }

        // Function to display an error message in the content area
        function displayError(message) {
            const contentContainer = document.getElementById('worksheetContent');
            contentContainer.innerHTML = `
                <section style="border-color: #f44336;">
                    <h2><span class="emoji">⚠️</span> Erreur</h2>
                    <p>${message}</p>
                    <button class="back-button" onclick="returnToDashboard()">← Retour au Tableau de Bord</button>
                </section>
            `;
            // Hide status bar elements on error
             document.getElementById('sheetId').textContent = 'Erreur';
             document.getElementById('saveNotification').style.display = 'none';
        }

        // Configurer les champs de réponse pour sauvegarder en temps réel
        function setupAnswerFields() {
            // Find all elements with the class 'answer-input' INSIDE the loaded content
            const answerInputs = document.querySelectorAll('#worksheetContent .answer-input');
            console.log(`Worksheet: Setting up ${answerInputs.length} answer input fields.`);

            answerInputs.forEach(input => {
                // Use 'input' event for immediate feedback, or 'change' for on blur
                input.addEventListener('input', (event) => {
                    // Pass the specific input element's ID and its current value
                    saveAnswer(event.target.id, event.target.value);
                });
            });
        }

        // Charger les réponses sauvegardées depuis la base de données
        function loadSavedAnswers() {
             if (!progressRef) {
                 console.error("Worksheet: Cannot load answers, progressRef is not set.");
                 return;
            }

            progressRef.once('value', (snapshot) => {
                const savedData = snapshot.val();
                if (savedData && typeof savedData === 'object') {
                     console.log("Worksheet: Loading saved answers.", savedData);
                    // Fill input fields with the saved data
                    Object.keys(savedData).forEach(inputId => {
                        const inputElement = document.getElementById(inputId);
                        if (inputElement) {
                            // Check if the saved value is not null before setting
                            if (savedData[inputId] !== null) {
                                 inputElement.value = savedData[inputId];
                            } else {
                                 inputElement.value = ''; // Set to empty if saved value is null
                            }
                        } else {
                             console.warn(`Worksheet: Saved answer found for ID "${inputId}", but no corresponding input element exists in the current content.`);
                        }
                    });
                } else {
                     console.log("Worksheet: No saved answers found for this worksheet.");
                }
            }).catch(error => {
                 console.error("Worksheet: Error loading saved answers:", error);
            });
        }

        // Sauvegarder une réponse dans la base de données (avec délai)
        let saveTimeout; // Timer variable for debouncing saves
        function saveAnswer(inputId, value) {
             if (!progressRef) {
                 console.error("Worksheet: Cannot save answer, progressRef is not set.");
                 return;
             }
             if (!inputId) {
                 console.warn("Worksheet: Attempted to save answer for an input without an ID.");
                 return; // Cannot save without an ID
             }

            // Clear the previous timeout if user is still typing
            clearTimeout(saveTimeout);

            // Set a new timeout to save after 1 second of inactivity
            saveTimeout = setTimeout(() => {
                console.log(`Worksheet: Saving answer for ${inputId}: "${value}"`);
                // Save the value under the input's ID in the 'progress' node
                 // Using update is slightly safer than set if progress node might have other metadata
                const dataToUpdate = {};
                dataToUpdate[inputId] = value; // e.g., { "answer1a": "User's text" }

                progressRef.update(dataToUpdate) // Use update here
                    .then(() => {
                        // Show save confirmation notification
                        showSaveNotification('Sauvegarde automatique effectuée ✓', 'success');
                        console.log(`Worksheet: Answer saved successfully for ${inputId}.`);
                    })
                    .catch((error) => {
                        // Show save error notification
                        console.error(`Worksheet: Error saving answer for ${inputId}:`, error);
                        showSaveNotification('Erreur de sauvegarde ✗', 'error');
                    });
            }, 1000); // Debounce time: 1000ms = 1 second
        }

         // Function to show the save status notification
         function showSaveNotification(message, type) {
             const notification = document.getElementById('saveNotification');
             notification.textContent = message;
             // Add a class for styling success/error if needed
             notification.className = 'save-notification show ' + type; // Add type class
             notification.classList.add('show'); // Make it visible

             // Hide the notification after 2 seconds
             setTimeout(() => {
                 notification.classList.remove('show');
             }, 2000);
         }


        // Retourner au tableau de bord de l'étudiant actuel
        function returnToDashboard() {
             // Navigate back to the dashboard page for the student associated with this worksheet
             if (targetStudent) {
                 window.location.href = `dashboard.html?student=${targetStudent}`;
             } else {
                 // Fallback if targetStudent isn't set for some reason
                 window.location.href = 'index.html';
             }
        }

        // Note: The old 'DOMContentLoaded' listener is removed.
        // Initialization now happens inside the onAuthStateChanged check.

    </script>
